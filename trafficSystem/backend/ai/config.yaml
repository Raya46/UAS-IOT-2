gps:
  mode: "static"
  static:
    latitude: -6.200000
    longitude: 106.816666
    road_name: "Jl. Sudirman, Jakarta"
  mock_csv_path: "data/gps_mock.csv"

backend:
  enabled: true
  url: "http://localhost:8001"

outputs:
  evidence_image_dir: "outputs/evidence/images"
  plate_crop_dir: "outputs/evidence/plates"
  event_jsonl_path: "outputs/events/events.jsonl"
  event_csv_path: "outputs/events/events.csv"
  candidate_jsonl_path: "outputs/events/parking_candidates.jsonl"
  etle_export_dir: "outputs/exports/etle"

parking_confirmation:
  enabled: true
  confirmation_window_minutes: 30
  min_matching_score: 0.65
  require_second_camera: false
  allow_later_same_route_confirmation: true

counting_lines:
  - id: line_001
    name: Main Traffic Count Line
    points:
      - [100, 400]
      - [900, 400]
    directions:
      positive: forward
      negative: backward

parking_spots:
  - id: spot_001
    points:
      - [100, 200]
      - [200, 200]
      - [200, 300]
      - [100, 300]

traffic_density:
