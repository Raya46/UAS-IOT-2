app:
  window_name: "HAYDEN AI Clone MVP"
  show_fps: true
  resize_width: 960
  draw_center_points: true

source:
  default: 0
  type: "cctv"
  camera_id: "jaklingko_001"
  route_id: "route_001"
  road_segment_id: "segment_001"

models:
  vehicle_model_path: "models/yolov8s.pt"
  use_plate_model: true
  plate_model_path: "models/indonesian_plate.pt"
  use_sign_model: true
  sign_model_path: "models/traffic_sign.pt"
  use_traffic_sign_model: true
  traffic_sign_model_path: "models/jaklingko_sign.pt"
  use_transport_model: true
  transport_model_path: "models/transport_category.pt"
  use_lane_model: true
  lane_model_path: "models/yolov8m-lane-seg.pt"
  lane_process_interval_frames: 5
  use_yolop_model: false
  yolop_process_interval_frames: 10

detection:
  interval_frames: 3
  confidence: 0.25
  iou: 0.45
  allowed_classes:
    - car
    - motorcycle
    - bus
    - truck
    - bicycle
    - person
    - jaklingko
    - angkot_merah
    - angkot_hijau
    - angkot_biru
    - transjakarta
    - metrotrans
    - rambu_stop_jaklingko
    - traffic_light
    - "traffic light"

tracking:
  max_match_distance_pixels: 150
  max_disappeared_seconds: 5.0
  movement_threshold_pixels: 8
  stopped_seconds_threshold: 2
  stationary_drift_pixels: 25

violation:
  illegal_parking_seconds: 5
  evidence_cooldown_seconds: 20
  save_once_per_track: true

zone:
  no_parking_polygon:
    - [80, 300]
    - [620, 300]
    - [780, 700]
    - [20, 700]

traffic:
  medium_vehicle_count: 5
  high_vehicle_count: 12
  severe_vehicle_count: 20
  high_stopped_ratio: 0.3
  severe_stopped_ratio: 0.5
  cctv_stopped_seconds_threshold: 15.0

ocr:
  enabled: true
  generate_mock_on_failure: false
  languages:
    - en
  min_text_confidence: 0.15
  plate_regex: "^[A-Z]{1,2}\\s?[0-9]{1,4}\\s?[A-Z]{0,3}$"

source_profiles:
  default:
    scenario_label: "Generic traffic feed"
    enabled_violations:
      - illegal_parking
      - shoulder_lane_violation
      - red_light_violation
      - illegal_u_turn
      - unsafe_lane_change
      - traffic_sign_violation
    priority:
      - illegal_parking
      - traffic_sign_violation
      - illegal_u_turn
      - red_light_violation
      - unsafe_lane_change
      - shoulder_lane_violation
    perspective_src: [[364, 216], [595, 216], [912, 513], [48, 513]]
